<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>csh.com</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(154,234,243,0.43);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 2em; }
        p { color: #666; line-height: 1.8; margin-bottom: 15px; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #9845db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            margin: 10px;
            transition: transform 0.3s;
        }
        .btn:hover { transform: translateY(-3px); }
        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit:cover ;
            border: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo.jpg" alt="wode">
        <h1>欢迎来到星辰如墨的Blog</h1>
        <p>欢迎来到我们团队的网站！<br>这里分享我我们的项目和想法。</p>
        <a href="#" class="btn">我们的产品</a>
        <a href="#" class="btn">联系我们</a>
    </div>
</body>
</html>
